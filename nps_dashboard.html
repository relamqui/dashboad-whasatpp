<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WP CRM — Painel NPS</title>
  <meta name="description" content="Painel de NPS com ranking por filial, setor e atendente." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    :root {
      --nps-green: #00c896;
      --nps-yellow: #f5a623;
      --nps-red: #e74c3c;
      --nps-blue: #3498db;
      --card-glow: rgba(0, 200, 150, 0.08);
    }

    body {
      height: auto;
      overflow: auto;
      background-color: var(--bg-app);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
    }

    .page-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 40px;
    }

    /* ─── Header ─── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      background: none;
      border: none;
      cursor: pointer;
      transition: color .2s;
    }
    .back-btn:hover { color: var(--text-primary); }

    .page-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .page-title h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, #00c896, #3498db);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-title span {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ─── Filtros ─── */
    .filters-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      display: flex;
      gap: 16px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .form-group input, .form-group select {
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: white;
      outline: none;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      min-width: 150px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00c896, #00a87a);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: opacity .2s, transform .1s;
    }
    .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* ─── Tabs ─── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
      width: fit-content;
    }
    .tab-btn {
      padding: 9px 22px;
      border-radius: 9px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all .2s;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #00c896, #00a87a);
      color: white;
      font-weight: 600;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ─── NPS Score Badge ─── */
    .nps-score {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      font-size: 16px;
      font-weight: 800;
      border: 3px solid;
    }
    .nps-score.excelente { color: var(--nps-green); border-color: var(--nps-green); background: rgba(0,200,150,.1); }
    .nps-score.bom       { color: var(--nps-blue);  border-color: var(--nps-blue);  background: rgba(52,152,219,.1); }
    .nps-score.neutro    { color: var(--nps-yellow); border-color: var(--nps-yellow); background: rgba(245,166,35,.1); }
    .nps-score.ruim      { color: var(--nps-red);   border-color: var(--nps-red);   background: rgba(231,76,60,.1); }

    .media-nota-big {
      font-size: 22px;
      font-weight: 800;
    }
    .media-nota-big.alta  { color: var(--nps-green); }
    .media-nota-big.media { color: var(--nps-yellow); }
    .media-nota-big.baixa { color: var(--nps-red); }

    /* ─── Filial Accordion ─── */
    .filial-block {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 20px;
      overflow: hidden;
      transition: box-shadow .2s;
    }
    .filial-block:hover {
      box-shadow: 0 4px 24px var(--card-glow);
    }
    .filial-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      cursor: pointer;
      user-select: none;
      transition: background .2s;
    }
    .filial-header:hover {
      background: rgba(255,255,255,.03);
    }
    .filial-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .filial-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(0,200,150,.2), rgba(52,152,219,.2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .filial-name {
      font-size: 17px;
      font-weight: 700;
    }
    .filial-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 3px;
    }
    .filial-header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .chevron {
      transition: transform .3s;
      color: var(--text-secondary);
    }
    .filial-block.open .chevron {
      transform: rotate(180deg);
    }
    .filial-body {
      display: none;
      padding: 0 16px 16px;
    }
    .filial-block.open .filial-body {
      display: block;
    }

    /* ─── Setor Cards Grid ─── */
    .setores-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .setor-card {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      transition: transform .2s, border-color .2s;
    }
    .setor-card:hover {
      transform: translateY(-2px);
      border-color: rgba(0,200,150,.3);
    }
    .setor-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .setor-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .setor-votos {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    /* ─── Bar de Progresso NPS ─── */
    .nps-bars {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 12px;
    }
    .nps-bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .nps-bar-label {
      width: 70px;
      color: var(--text-secondary);
    }
    .nps-bar-track {
      flex: 1;
      height: 7px;
      background: rgba(255,255,255,.08);
      border-radius: 10px;
      overflow: hidden;
    }
    .nps-bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width .6s ease;
    }
    .nps-bar-fill.promotores { background: var(--nps-green); }
    .nps-bar-fill.neutros    { background: var(--nps-yellow); }
    .nps-bar-fill.detratores { background: var(--nps-red); }
    .nps-bar-count {
      width: 24px;
      text-align: right;
      color: var(--text-secondary);
    }

    /* ─── Ranking Table Atendentes ─── */
    .ranking-table-wrap {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }
    table.ranking-table {
      width: 100%;
      border-collapse: collapse;
    }
    table.ranking-table th {
      padding: 14px 18px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: .07em;
      background: rgba(0,0,0,.2);
      border-bottom: 1px solid var(--border);
    }
    table.ranking-table td {
      padding: 14px 18px;
      font-size: 14px;
      color: var(--text-primary);
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    table.ranking-table tr:last-child td {
      border-bottom: none;
    }
    table.ranking-table tr:hover td {
      background: rgba(255,255,255,.02);
    }

    .rank-pos {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 15px;
      color: var(--text-secondary);
    }
    .rank-pos .medal { font-size: 20px; }

    .atendente-info { display: flex; flex-direction: column; }
    .atendente-name { font-weight: 600; font-size: 14px; }
    .atendente-setor { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    .nps-mini {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 13px;
      font-weight: 800;
      border: 2px solid;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .pill.promotor  { background: rgba(0,200,150,.15); color: var(--nps-green); }
    .pill.neutro    { background: rgba(245,166,35,.15); color: var(--nps-yellow); }
    .pill.detrator  { background: rgba(231,76,60,.15);  color: var(--nps-red); }

    /* ─── Empty state ─── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* ─── Loading spinner ─── */
    .spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }
    .spinner::after {
      content: '';
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,.1);
      border-top-color: var(--nps-green);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="page-container">

    <!-- Header -->
    <div class="page-header">
      <div>
        <button class="back-btn" onclick="location.href='dashboard.html'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
          Voltar ao Dashboard
        </button>
        <div class="page-title">
          <h1>⭐ Painel NPS</h1>
          <span>Ranking de satisfação por filial, setor e atendente</span>
        </div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="filters-bar">
      <div class="form-group">
        <label>Data Início</label>
        <input type="date" id="filterStart" />
      </div>
      <div class="form-group">
        <label>Data Fim</label>
        <input type="date" id="filterEnd" />
      </div>
      <button class="btn-primary" onclick="loadAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:6px">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Filtrar
      </button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-filiais" onclick="switchTab('filiais')">🏢 Por Filial / Setor</button>
      <button class="tab-btn" id="tab-atendentes" onclick="switchTab('atendentes')">🧑‍💼 Ranking Atendentes</button>
    </div>

    <!-- Tab Filiais -->
    <div class="tab-content active" id="content-filiais">
      <div id="filiais-container"><div class="spinner"></div></div>
    </div>

    <!-- Tab Atendentes -->
    <div class="tab-content" id="content-atendentes">
      <div id="atendentes-container"><div class="spinner"></div></div>
    </div>

  </div><!-- /page-container -->

  <script>
    const API_URL = window.location.origin;

    /* ─── Autenticação ─── */
    const token = () => localStorage.getItem('wp_crm_token');
    window.onload = () => {
      if (!token()) { window.location.href = 'index.html'; return; }
      const today = new Date().toISOString().split('T')[0];
      const firstDay = `${new Date().getFullYear()}-01-01`;
      document.getElementById('filterStart').value = firstDay;
      document.getElementById('filterEnd').value = today;
      loadAll();
    };

    /* ─── Tabs ─── */
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      document.getElementById(`content-${tab}`).classList.add('active');
    }

    /* ─── Carrega ambos ─── */
    function loadAll() {
      loadFiliais();
      loadAtendentes();
    }

    function getDateParams() {
      const start = document.getElementById('filterStart').value;
      const end   = document.getElementById('filterEnd').value;
      const p = new URLSearchParams();
      if (start) p.append('start_date', start);
      if (end)   p.append('end_date', end);
      return p.toString() ? `?${p.toString()}` : '';
    }

    /* ─── Helpers de Score ─── */
    function npsClass(score) {
      if (score >= 75)  return 'excelente';
      if (score >= 50)  return 'bom';
      if (score >= 0)   return 'neutro';
      return 'ruim';
    }
    function mediaClass(nota) {
      if (nota >= 8.5) return 'alta';
      if (nota >= 6)   return 'media';
      return 'baixa';
    }
    function barPct(val, total) {
      return total > 0 ? Math.round((val / total) * 100) : 0;
    }

    /* ════════════════════════════════════════
       FILIAIS
    ════════════════════════════════════════ */
    async function loadFiliais() {
      const container = document.getElementById('filiais-container');
      container.innerHTML = '<div class="spinner"></div>';
      try {
        const res = await fetch(`${API_URL}/api/reports/nps-filiais${getDateParams()}`, {
          headers: { 'Authorization': `Bearer ${token()}` }
        });
        const json = await res.json();
        if (!res.ok || !json.success) {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${json.error || 'Erro ao carregar dados.'}</p></div>`;
          return;
        }
        const data = json.data || [];
        if (data.length === 0) {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>Nenhum voto NPS encontrado no período.</p></div>`;
          return;
        }
        container.innerHTML = data.map((filial, fi) => renderFilialBlock(filial, fi)).join('');
      } catch (e) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><p>Erro de conexão.</p></div>`;
      }
    }

    function renderFilialBlock(filial, fi) {
      // Calcula totais da filial
      let totalVotos = 0, totalProm = 0, totalNeut = 0, totalDetr = 0, somaMedia = 0;
      filial.setores.forEach(s => {
        totalVotos += s.total_votos;
        totalProm  += s.promotores;
        totalNeut  += s.neutros;
        totalDetr  += s.detratores;
        somaMedia  += s.media_nota * s.total_votos;
      });
      const filialNps   = totalVotos > 0 ? Math.round(((totalProm - totalDetr) / totalVotos) * 100) : 0;
      const filialMedia = totalVotos > 0 ? (somaMedia / totalVotos).toFixed(1) : '–';
      const cls = npsClass(filialNps);

      return `
        <div class="filial-block" id="filial-${fi}">
          <div class="filial-header" onclick="toggleFilial(${fi})">
            <div class="filial-header-left">
              <div class="filial-icon">🏢</div>
              <div>
                <div class="filial-name">${filial.filial}</div>
                <div class="filial-meta">${filial.setores.length} setor(es) · ${totalVotos} votos</div>
              </div>
            </div>
            <div class="filial-header-right">
              <div style="text-align:right">
                <div class="media-nota-big ${mediaClass(parseFloat(filialMedia))}">⭐ ${filialMedia}</div>
                <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">Média das notas</div>
              </div>
              <div class="nps-score ${cls}">${filialNps}</div>
              <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
          </div>
          <div class="filial-body">
            <div class="setores-grid">
              ${filial.setores.map(s => renderSetorCard(s)).join('')}
            </div>
          </div>
        </div>`;
    }

    function renderSetorCard(s) {
      const cls  = npsClass(s.nps_score);
      const pPct = barPct(s.promotores, s.total_votos);
      const nPct = barPct(s.neutros,    s.total_votos);
      const dPct = barPct(s.detratores, s.total_votos);
      return `
        <div class="setor-card">
          <div class="setor-card-header">
            <div>
              <div class="setor-name">${s.setor}</div>
              <div class="setor-votos">${s.total_votos} voto(s)</div>
            </div>
            <div style="text-align:center">
              <div class="nps-mini ${cls}">${s.nps_score}</div>
              <div style="font-size:10px;color:var(--text-secondary);margin-top:4px">NPS</div>
            </div>
          </div>
          <div style="display:flex;gap:12px;margin-bottom:10px;font-size:13px">
            <span>⭐ <strong style="color:var(--text-primary)">${s.media_nota}</strong> <span style="color:var(--text-secondary)">média</span></span>
          </div>
          <div class="nps-bars">
            <div class="nps-bar-row">
              <span class="nps-bar-label">😊 Prom.</span>
              <div class="nps-bar-track"><div class="nps-bar-fill promotores" style="width:${pPct}%"></div></div>
              <span class="nps-bar-count">${s.promotores}</span>
            </div>
            <div class="nps-bar-row">
              <span class="nps-bar-label">😐 Neutros</span>
              <div class="nps-bar-track"><div class="nps-bar-fill neutros" style="width:${nPct}%"></div></div>
              <span class="nps-bar-count">${s.neutros}</span>
            </div>
            <div class="nps-bar-row">
              <span class="nps-bar-label">😞 Detr.</span>
              <div class="nps-bar-track"><div class="nps-bar-fill detratores" style="width:${dPct}%"></div></div>
              <span class="nps-bar-count">${s.detratores}</span>
            </div>
          </div>
        </div>`;
    }

    function toggleFilial(fi) {
      const block = document.getElementById(`filial-${fi}`);
      block.classList.toggle('open');
    }

    /* ════════════════════════════════════════
       ATENDENTES
    ════════════════════════════════════════ */
    async function loadAtendentes() {
      const container = document.getElementById('atendentes-container');
      container.innerHTML = '<div class="spinner"></div>';
      try {
        const res = await fetch(`${API_URL}/api/reports/nps-atendentes${getDateParams()}`, {
          headers: { 'Authorization': `Bearer ${token()}` }
        });
        const json = await res.json();
        if (!res.ok || !json.success) {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${json.error || 'Erro ao carregar dados.'}</p></div>`;
          return;
        }
        const data = json.data || [];
        if (data.length === 0) {
          container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>Nenhum voto NPS encontrado no período.</p></div>`;
          return;
        }
        container.innerHTML = `
          <div class="ranking-table-wrap">
            <table class="ranking-table">
              <thead>
                <tr>
                  <th>Posição</th>
                  <th>Atendente</th>
                  <th>Filial</th>
                  <th>NPS Score</th>
                  <th>Média ⭐</th>
                  <th>Promotores</th>
                  <th>Neutros</th>
                  <th>Detratores</th>
                  <th>Total Votos</th>
                </tr>
              </thead>
              <tbody>
                ${data.map((row, i) => renderAtendenteRow(row, i)).join('')}
              </tbody>
            </table>
          </div>`;
      } catch (e) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><p>Erro de conexão.</p></div>`;
      }
    }

    function renderAtendenteRow(row, i) {
      const medals = ['🥇', '🥈', '🥉'];
      const medal  = medals[i] || '';
      const cls    = npsClass(row.nps_score);
      const mCls   = mediaClass(row.media_nota);

      return `
        <tr>
          <td>
            <div class="rank-pos">
              <span class="medal">${medal}</span>
              <span>#${i + 1}</span>
            </div>
          </td>
          <td>
            <div class="atendente-info">
              <span class="atendente-name">${row.atendente}</span>
              <span class="atendente-setor">${row.setor}</span>
            </div>
          </td>
          <td style="color:var(--text-secondary);font-size:13px">${row.filial}</td>
          <td><div class="nps-mini ${cls}">${row.nps_score}</div></td>
          <td><span class="media-nota-big ${mCls}" style="font-size:16px">⭐ ${row.media_nota}</span></td>
          <td><span class="pill promotor">😊 ${row.promotores}</span></td>
          <td><span class="pill neutro">😐 ${row.neutros}</span></td>
          <td><span class="pill detrator">😞 ${row.detratores}</span></td>
          <td style="font-weight:600">${row.total_votos}</td>
        </tr>`;
    }
  </script>
</body>
</html>
